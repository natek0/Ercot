name: CI

# Runs the Stage 1 verification suite on every push and PR. No ERCOT
# credentials or cached data are available in CI, so the data-dependent tests
# skip automatically (see the skipif guards in tests/); everything that runs
# uses synthetic in-memory instances.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Oracle self-test (synthetic, no data)
        run: python -m src.oracle

      - name: Run test suite
        run: python -m pytest
